<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>نظام تتبع مهام الرواتب</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f5f5f3; color: #1a1a1a; padding: 24px; max-width: 800px; margin: 0 auto; }
  .header { padding: 1.5rem 0 1rem; border-bottom: 1px solid #e0e0e0; margin-bottom: 1.5rem; }
  .header h1 { font-size: 22px; font-weight: 600; }
  .header p { font-size: 13px; color: #888; margin-top: 4px; }
  .add-task-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1.5rem; }
  .add-task-card h2 { font-size: 15px; font-weight: 500; margin-bottom: 12px; }
  .form-row { display: flex; gap: 10px; align-items: flex-end; }
  .form-group { display: flex; flex-direction: column; gap: 4px; flex: 1; }
  .form-group label { font-size: 12px; color: #888; }
  input[type=text] { width: 100%; padding: 9px 12px; font-size: 14px; border: 1px solid #ddd; border-radius: 8px; background: #fafafa; color: #1a1a1a; font-family: inherit; }
  input[type=text]:focus { outline: none; border-color: #999; }
  select { padding: 8px 10px; font-size: 13px; border: 1px solid #ddd; border-radius: 8px; background: #fafafa; color: #1a1a1a; font-family: inherit; }
  .add-btn { background: #1a1a1a; color: #fff; border: none; border-radius: 8px; padding: 9px 20px; font-size: 14px; font-weight: 500; cursor: pointer; white-space: nowrap; font-family: inherit; }
  .add-btn:hover { opacity: 0.85; }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.5rem; }
  .stat { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 12px; text-align: center; }
  .stat-name { font-size: 13px; font-weight: 500; }
  .open-count { font-size: 24px; font-weight: 600; margin-top: 4px; }
  .open-label { font-size: 11px; color: #888; margin-top: 2px; }
  .tasks-section h2 { font-size: 15px; font-weight: 500; margin-bottom: 10px; }
  .filter-row { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
  .filter-btn { padding: 5px 14px; border-radius: 20px; border: 1px solid #ddd; background: #f0f0f0; font-size: 13px; cursor: pointer; color: #555; font-family: inherit; }
  .filter-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .task-item { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
  .task-item.done { opacity: 0.55; }
  .task-name { flex: 1; font-size: 14px; }
  .task-name.done-text { text-decoration: line-through; color: #999; }
  .task-closer { font-size: 12px; background: #EAF3DE; color: #27500A; padding: 3px 10px; border-radius: 20px; }
  .who-select { font-size: 12px; padding: 5px 8px; border: 1px solid #ddd; border-radius: 8px; background: #fafafa; color: #1a1a1a; font-family: inherit; }
  .close-btn { background: none; border: 1px solid #ddd; border-radius: 8px; padding: 5px 12px; font-size: 12px; cursor: pointer; color: #555; font-family: inherit; }
  .close-btn:hover { background: #f5f5f5; }
  .empty { text-align: center; color: #aaa; font-size: 14px; padding: 2rem; }
  @media (max-width: 600px) {
    body { padding: 16px; }
    .stats { grid-template-columns: repeat(2, 1fr); }
    .form-row { flex-direction: column; }
    .add-btn { width: 100%; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>نظام تتبع مهام الرواتب</h1>
  <p>أي موظف فاضي يختار مهمة ويغلقها باسمه</p>
</div>

<div class="add-task-card">
  <h2>إضافة مهمة جديدة</h2>
  <div class="form-row">
    <div class="form-group">
      <label>اسم المهمة</label>
      <input type="text" id="taskName" placeholder="مثال: مراجعة كشف الراتب" onkeydown="if(event.key==='Enter')addTask()" />
    </div>
    <button class="add-btn" onclick="addTask()">+ إضافة</button>
  </div>
</div>

<div class="stats">
  <div class="stat"><div class="stat-name">مشاعل</div><div class="open-count" id="s-مشاعل">0</div><div class="open-label">مهمة مغلقة</div></div>
  <div class="stat"><div class="stat-name">محمد</div><div class="open-count" id="s-محمد">0</div><div class="open-label">مهمة مغلقة</div></div>
  <div class="stat"><div class="stat-name">نبيل</div><div class="open-count" id="s-نبيل">0</div><div class="open-label">مهمة مغلقة</div></div>
  <div class="stat"><div class="stat-name">ماجد</div><div class="open-count" id="s-ماجد">0</div><div class="open-label">مهمة مغلقة</div></div>
</div>

<div class="tasks-section">
  <h2>المهام</h2>
  <div class="filter-row">
    <button class="filter-btn active" onclick="setFilter('all', this)">الكل</button>
    <button class="filter-btn" onclick="setFilter('open', this)">مفتوحة</button>
    <button class="filter-btn" onclick="setFilter('done', this)">مغلقة</button>
    <button class="filter-btn" onclick="setFilter('مشاعل', this)">مشاعل</button>
    <button class="filter-btn" onclick="setFilter('محمد', this)">محمد</button>
    <button class="filter-btn" onclick="setFilter('نبيل', this)">نبيل</button>
    <button class="filter-btn" onclick="setFilter('ماجد', this)">ماجد</button>
  </div>
  <div id="taskList"></div>
</div>

<script>
  let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
  let currentFilter = 'all';
  const employees = ['مشاعل', 'محمد', 'نبيل', 'ماجد'];

  function save() {
    localStorage.setItem('tasks', JSON.stringify(tasks));
  }

  function addTask() {
    const name = document.getElementById('taskName').value.trim();
    if (!name) { alert('يرجى إدخال اسم المهمة'); return; }
    tasks.unshift({ id: Date.now(), name, done: false, closedBy: null, closedAt: null });
    document.getElementById('taskName').value = '';
    save();
    render();
  }

  function closeTask(id, closer) {
    if (!closer) { alert('اختر اسمك أولاً'); return; }
    const t = tasks.find(x => x.id === id);
    if (t) {
      t.done = true;
      t.closedBy = closer;
      t.closedAt = new Date().toLocaleString('ar-SA');
    }
    save();
    render();
  }

  function deleteTask(id) {
    if (!confirm('هل تريد حذف هذه المهمة؟')) return;
    tasks = tasks.filter(x => x.id !== id);
    save();
    render();
  }

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function updateStats() {
    employees.forEach(emp => {
      const done = tasks.filter(t => t.done && t.closedBy === emp).length;
      document.getElementById('s-' + emp).textContent = done;
    });
  }

  function render() {
    updateStats();
    let filtered = tasks;
    if (currentFilter === 'open') filtered = tasks.filter(t => !t.done);
    else if (currentFilter === 'done') filtered = tasks.filter(t => t.done);
    else if (employees.includes(currentFilter)) filtered = tasks.filter(t => t.closedBy === currentFilter);

    const list = document.getElementById('taskList');
    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty">لا توجد مهام</div>';
      return;
    }

    list.innerHTML = filtered.map(t => `
      <div class="task-item ${t.done ? 'done' : ''}">
        <div style="flex:1">
          <div class="task-name ${t.done ? 'done-text' : ''}">${t.name}</div>
          ${t.done ? `<div style="margin-top:5px"><span class="task-closer">أغلقها: ${t.closedBy} — ${t.closedAt}</span></div>` : ''}
        </div>
        ${!t.done ? `
          <select class="who-select" id="closer-${t.id}">
            <option value="">أنا...</option>
            ${employees.map(e => `<option>${e}</option>`).join('')}
          </select>
          <button class="close-btn" onclick="closeTask(${t.id}, document.getElementById('closer-${t.id}').value)">تم ✓</button>
        ` : ''}
        <button class="close-btn" onclick="deleteTask(${t.id})">حذف</button>
      </div>
    `).join('');
  }

  render();
</script>
</body>
</html>
