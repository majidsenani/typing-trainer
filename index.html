<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مدرب خفة اليد والتنسيق</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050a14;
    --panel: rgba(10,20,40,0.85);
    --accent: #00f0ff;
    --green: #00ff88;
    --red: #ff3355;
    --gold: #ffd700;
    --text: #c8e0ff;
    --dim: #4a6a9a;
    --glow: 0 0 20px var(--accent), 0 0 40px rgba(0,240,255,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'Cairo', sans-serif;
    overflow: hidden;
    height: 100vh;
    color: var(--text);
  }

  /* خلفية شبكة متحركة */
  #grid-bg {
    position: fixed;
    inset: 0;
    background-image: linear-gradient(rgba(0,240,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0,240,255,0.05) 1px, transparent 1px);
    background-size: 50px 50px;
    z-index: 0;
    pointer-events: none;
  }

  /* شاشة البداية */
  #start-screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 200;
    background: rgba(5,10,20,0.98);
    gap: 30px;
  }

  .logo-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 48px;
    color: var(--accent);
    text-shadow: var(--glow);
    text-align: center;
  }

  .level-btn {
    padding: 12px 30px;
    border: 2px solid var(--accent);
    background: transparent;
    color: var(--accent);
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Cairo', sans-serif;
    font-weight: bold;
    transition: 0.3s;
    margin: 5px;
  }

  .level-btn.selected {
    background: var(--accent);
    color: #000;
  }

  .start-btn {
    padding: 18px 60px;
    background: var(--green);
    color: #000;
    border: none;
    border-radius: 50px;
    font-size: 20px;
    font-weight: 900;
    cursor: pointer;
    box-shadow: 0 0 20px var(--green);
  }

  /* HUD */
  #hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 70px;
    display: flex;
    align-items: center;
    justify-content: space-around;
    background: rgba(10,20,40,0.9);
    border-bottom: 2px solid var(--accent);
    z-index: 100;
    display: none;
  }

  .stat { text-align: center; }
  .stat-val { font-family: 'Orbitron', sans-serif; font-size: 24px; color: var(--accent); }
  .stat-lbl { font-size: 10px; color: var(--dim); }

  /* الهدف */
  .target {
    position: absolute;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    color: white;
    cursor: crosshair;
    border: 4px solid rgba(255,255,255,0.4);
    transition: transform 0.1s;
  }

  .target.key-ok {
    background: var(--green) !important;
    border-color: #fff;
    transform: scale(1.2);
    box-shadow: 0 0 30px var(--green);
  }

  /* شاشة النهاية */
  #end-screen {
    position: fixed;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 200;
    background: rgba(5,10,20,0.95);
    text-align: center;
  }
</style>
</head>
<body>

<div id="grid-bg"></div>

<div id="start-screen">
  <div class="logo-title">REFLEX TRAINER</div>
  <p style="max-width: 400px; text-align: center;">التدريب: اضغط الحرف بالكيبورد (يد يسرى) ثم انقر الدائرة بالماوس (يد يمنى).</p>
  
  <div>
    <button class="level-btn selected" onclick="setLevel('easy', this)">سهل</button>
    <button class="level-btn" onclick="setLevel('medium', this)">متوسط</button>
    <button class="level-btn" onclick="setLevel('hard', this)">صعب</button>
  </div>
  
  <button class="start-btn" onclick="startGame()">ابدأ التدريب ⚡</button>
</div>

<div id="hud">
  <div class="stat"><div class="stat-lbl">النقاط</div><div class="stat-val" id="score">0</div></div>
  <div class="stat"><div class="stat-lbl">الوقت</div><div class="stat-val" id="timer">30</div></div>
  <div class="stat"><div class="stat-lbl">السرعة</div><div class="stat-val" id="speed">0</div></div>
</div>

<div id="game-container"></div>

<div id="end-screen">
  <h1 style="color:var(--gold); font-size: 40px;">انتهى الوقت!</h1>
  <div style="margin: 20px; font-size: 24px;">
    النقاط: <span id="final-score" style="color:var(--accent)">0</span><br>
    الأهداف/دقيقة: <span id="final-speed" style="color:var(--green)">0</span>
  </div>
  <button class="level-btn" onclick="location.reload()">إعادة المحاولة 🔄</button>
</div>

<script>
let score = 0;
let timeLeft = 30;
let gameActive = false;
let currentKey = '';
let level = 'easy';
const chars = "ASDFJKLGHQWERTYUIOP";

function setLevel(l, btn) {
    level = l;
    document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
}

function startGame() {
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('hud').style.display = 'flex';
    gameActive = true;
    score = 0;
    timeLeft = 30;
    spawnTarget();
    
    const timer = setInterval(() => {
        timeLeft--;
        document.getElementById('timer').innerText = timeLeft;
        if (timeLeft <= 0) {
            clearInterval(timer);
            endGame();
        }
    }, 1000);
}

function spawnTarget() {
    if (!gameActive) return;
    const container = document.getElementById('game-container');
    container.innerHTML = '';
    
    const target = document.createElement('div');
    const char = chars[Math.floor(Math.random() * (level === 'easy' ? 7 : chars.length))];
    const size = level === 'easy' ? 100 : (level === 'medium' ? 80 : 60);
    
    target.className = 'target';
    target.innerText = char;
    target.style.width = size + 'px';
    target.style.height = size + 'px';
    target.style.fontSize = (size/2) + 'px';
    target.style.background = `hsl(${Math.random()*360}, 70%, 50%, 0.6)`;
    
    const x = Math.random() * (window.innerWidth - size);
    const y = Math.random() * (window.innerHeight - size - 100) + 80;
    
    target.style.left = x + 'px';
    target.style.top = y + 'px';
    
    target.onmousedown = () => {
        if (currentKey === char) {
            score++;
            document.getElementById('score').innerText = score;
            currentKey = '';
            spawnTarget();
        }
    };
    
    container.appendChild(target);
}

window.addEventListener('keydown', (e) => {
    if (!gameActive) return;
    currentKey = e.key.toUpperCase();
    const target = document.querySelector('.target');
    if (target && currentKey === target.innerText) {
        target.classList.add('key-ok');
    }
});

window.addEventListener('keyup', () => {
    const target = document.querySelector('.target');
    if (target) target.classList.remove('key-ok');
});

function endGame() {
    gameActive = false;
    document.getElementById('game-container').innerHTML = '';
    document.getElementById('end-screen').style.display = 'flex';
    document.getElementById('final-score').innerText = score;
    document.getElementById('final-speed').innerText = score * 2;
}
</script>
</body>
</html>
